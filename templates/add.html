<!DOCTYPE html>
<html>
<head>
<title>Add Contact</title>
<!-- Bootstrap -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<form method="POST" class="container mt-4" onsubmit="return validateForm()">
  <h2>Add Contact</h2>
  <input name="first_name" placeholder="First Name" class="form-control mb-2">
  <input name="last_name" placeholder="Last Name" class="form-control mb-2">
  <input name="address" placeholder="Address" class="form-control mb-2">
  <input name="email" placeholder="Email" class="form-control mb-2">
  <input name="phone" placeholder="Phone Number" class="form-control mb-2">
  <button class="btn btn-success">Save</button>
</form>

<script>
function validateForm() {
    let fname = document.getElementsByName("first_name")[0].value.trim();
    let lname = document.getElementsByName("last_name")[0].value.trim();
    let email = document.getElementsByName("email")[0].value.trim();
    let phone = document.getElementsByName("phone")[0].value.trim();

    // Name validation (letters and spaces only)
    let nameRegex = /^[A-Za-z\s]+$/;
    if (!nameRegex.test(fname) || !nameRegex.test(lname)) {
        alert("Name must contain only letters and spaces, no special characters.");
        return false;
    }

    // Email validation (must contain .com and no special characters except @ and .)
    let emailRegex = /^[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,}$/;
    if (!emailRegex.test(email)) {
        alert("Invalid Email. Must be a valid format and end with .com (e.g., example@gmail.com). No special characters allowed.");
        return false;
    }

    // Phone validation (10 digits only)
    let phoneRegex = /^[0-9]{10}$/;
    if (!phoneRegex.test(phone)) {
        alert("Phone number must be exactly 10 digits and contain only numbers.");
        return false;
    }

    return true; // allow form submission
}
</script>
</body>
</html>
