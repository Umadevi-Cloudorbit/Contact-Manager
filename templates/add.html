<!DOCTYPE html>
<html>

<head>
    <title>Add Contact</title>

    <!-- Bootstrap -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

     <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<form method="POST" class="container mt-4">

    <h2>Add Contact</h2>

    <input name="first_name" placeholder="First Name" class="form-control mb-2">
    <input name="last_name" placeholder="Last Name" class="form-control mb-2">
    <input name="address" placeholder="Address" class="form-control mb-2">
    <input name="email" placeholder="Email" class="form-control mb-2">
    <input name="phone" placeholder="Phone Number" class="form-control mb-2">

    <button class="btn btn-success">Save</button>

</form>

</body>
</html>
