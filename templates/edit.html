<!DOCTYPE html>
<html>

<head>
    <title>Edit Contact</title>

    <!-- Bootstrap -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

    
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<form method="POST" class="container mt-4">

    <h2>Edit Contact</h2>

    <input name="first_name" value="{{contact[1]}}" class="form-control mb-2">
    <input name="last_name" value="{{contact[2]}}" class="form-control mb-2">
    <input name="address" value="{{contact[3]}}" class="form-control mb-2">
    <input name="email" value="{{contact[4]}}" class="form-control mb-2">
    <input name="phone" value="{{contact[5]}}" class="form-control mb-2">

    <button class="btn btn-primary">Update</button>

</form>

</body>
</html>
